<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/favicon/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
    <title>Realizar Pedido</title>
</head>
<body>
    <header>
        <!-- Logo -->
        <div id="logo-menu">
            <img src="../assets/favicon/logo.png" alt="">
            <h1>Cultura Matera</h1>
        </div>

    <!-- Navbar -->
        <div id="menu">
            <nav>
                <ul>
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="../pages/servicios.html">Servicios</a></li>
                    <li><a href="../pages/pedido.html">Pedido</a></li>
                    <li><a href="../pages/equipo.html">Equipo</a></li>
                    <li><a href="../pages/faq.html">Preguntas Frecuentes</a></li>
                    <li><a href="../pages/contacto.html">Contacto</a></li>
                    <li><a href="../pages/login.html">Login</a></li>
                    <li><a href="../pages/perfil.html">Perfil</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="form-pedido">
            <form>
                <h1>Hace tu pedido!</h1>
                <label>Datos del Cliente</label>
                <br>
                <input type="text" placeholder="Nombre y Apellido">
                <input type="number" placeholder="Telefono">
                <input type="date">
                
                <h2>Selecciona los Productos</h2>
                <h3>Mates</h3>
                <br>
                <label for="">Tipo:</label>
                <select>
                    <option value="">Seleccione una opcion...</option>
                    <option value="">Imperial</option>
                    <option value="">Camionero</option>
                    <option value="">Torpedo</option>
                    <option value="">Criollo</option>
                </select>
                <br>
                <label for="">Color:</label>
                <select>
                    <option value="">Seleccione una opcion...</option>
                    <option value="">Negro</option>
                    <option value="">Marron</option>
                </select>
                <br>
                <label for="">Tamaño</label>
                <br>
                <label for="">S</label>
                <input type="checkbox">
                <label for="">M</label>
                <input type="checkbox">
                <label for="">L</label>
                <input type="checkbox">
                <label for="">XL</label>
                <input type="checkbox">
                <br>
                <label for="">Material:</label>
                <select>
                    <option value="">Seleccione una opcion...</option>
                    <option value="">Calabaza</option>
                    <option value="">Acero</option>
                    <option value="">Algorrobo</option>
                </select>
                <br><br>
                
                <h3>Bolsos y Materas</h3>
                <ul>
                    <li><label for="">Bolso Matero </label><input type="checkbox"></li>
                    <li><label for="">Canasta de Cuero </label><input type="checkbox"></li>
                    <li><label for="">Canaste de Ecocuero </label><input type="checkbox"></li>
                </ul>
                <br>
                <h3>Bombillas y Bombillones</h3>
                <br>
                <ul>
                    <li><label for="">Bombillon de Alpaca </label><input type="checkbox"></li>
                    <li><label for="">Bombillon de Acero Inoxidable </label><input type="checkbox"></li>
                    <li><label for="">Bombilla Pico Loro Alpaca </label><input type="checkbox"></li>
                    <li><label for="">Bombilla Pico Loro Acero Inoxidable </label><input type="checkbox"></li>
                </ul>
                <button type="submit">Enviar Pedido</button>
                <button type="submit">Borrar Todo</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="copyright">
            <p>Copyright © 2026. Todos los derechos reservados</p>
        </div>
    </footer>
</body>
</html>
